services:
  backend:
    build: .
    ports:
      - '3000:3000'
    networks:
      - biblioteca
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@database:5432/biblioteca
      - REDIS_URL=redis://redis:6379
    depends_on:
      - database
      - redis
  database:
    image: postgres:alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=biblioteca
    ports:
      - '5432:5432'
    networks:
      - biblioteca
    volumes:
      - db-data:/var/lib/postgresql/data
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    networks:
      - biblioteca
volumes:
  db-data:
networks:
  biblioteca:
    driver: bridge
